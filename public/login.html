<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesa 3D | Secure Workspace Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0B0F19;
            --card-dark: #161B26;
            --primary: #C5A880;
            --text-light: #F3F4F6;
            --text-muted: #9CA3AF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); height: 100vh; display: flex; justify-content: center; align-items: center; padding: 1rem; }
        
        .login-container { background: var(--card-dark); border: 1px solid #222938; width: 100%; max-width: 450px; border-radius: 8px; padding: 2.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo-header { text-align: center; margin-bottom: 2rem; }
        .logo-header h2 { color: var(--primary); font-size: 1.8rem; font-weight: 700; letter-spacing: 1px; }
        .logo-header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.3rem; }

        /* Auth Tabs Toggle Switch */
        .tab-switcher { display: flex; background: var(--bg-dark); padding: 0.3rem; border-radius: 6px; margin-bottom: 2rem; border: 1px solid #1E2533; }
        .tab-btn { flex: 1; padding: 0.7rem; background: transparent; border: none; color: var(--text-muted); font-weight: 600; font-size: 0.9rem; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .tab-btn.active { background: var(--primary); color: var(--bg-dark); }

        .form-panel { display: none; }
        .form-panel.active { display: block; }

        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 1px; }
        .form-group input, .form-group select { width: 100%; padding: 0.8rem; background: var(--bg-dark); border: 1px solid #222938; color: white; border-radius: 4px; font-size: 1rem; }
        .form-group input:focus, .form-group select:focus { border-color: var(--primary); outline: none; }

        .btn-submit { background: var(--primary); color: var(--bg-dark); width: 100%; padding: 0.9rem; font-weight: 700; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; margin-top: 1rem; transition: 0.3s; }
        .btn-submit:hover { opacity: 0.9; }
        
        .footer-link { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; }
        .footer-link a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-header">
            <h2>MESA 3D</h2>
            <p>SaaS Operations Control Point</p>
        </div>

        <div class="tab-switcher">
            <button class="tab-btn active" onclick="switchTab('admin')">Manager Login</button>
            <button class="tab-btn" onclick="switchTab('staff')">Kitchen Station</button>
        </div>

        <!-- MANAGER PANEL (TAB 1) -->
        <div id="adminPanel" class="form-panel active">
            <form id="adminForm">
                <div class="form-group">
                    <label>Corporate Email</label>
                    <input type="email" id="adminEmail" placeholder="manager@venue.com" required>
                </div>
                <div class="form-group">
                    <label>Account Password</label>
                    <input type="password" id="adminPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit">Enter Workspace</button>
            </form>
        </div>

        <!-- KITCHEN STAFF PANEL (TAB 2) -->
        <div id="staffPanel" class="form-panel">
            <form id="staffForm">
                <div class="form-group">
                    <label>Select Active Venue</label>
                    <select id="staffTenantDropdown" required>
                        <option value="">Fetching live tenants...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Kitchen Station 4-Digit PIN</label>
                    <input type="password" id="staffPasscode" placeholder="••••" maxlength="4" required style="text-align: center; font-size: 1.5rem; letter-spacing: 0.5rem;">
                </div>
                <button type="submit" class="btn-submit">Launch Display Monitor</button>
            </form>
        </div>

        <div class="footer-link">
            <p style="color: var(--text-muted);">New venue operator? <a href="index.html">Deploy system infrastructure</a></p>
        </div>
    </div>

    <script>
        // Fetch active tenants from backend database to dynamically populate dropdown selections
        async function loadTenants() {
            try {
                const response = await fetch('/api/tenants');
                const tenants = await response.json();
                const dropdown = document.getElementById('staffTenantDropdown');
                
                dropdown.innerHTML = '<option value="">-- Choose Your Venue --</option>';
                tenants.forEach(t => {
                    dropdown.innerHTML += `<option value="${t.id}">${t.name}</option>`;
                });
            } catch (err) {
                console.error("Error communicating with Mesa 3D core registry.");
            }
        }

        function switchTab(target) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form-panel').forEach(panel => panel.classList.remove('active'));

            if(target === 'admin') {
                document.querySelector(".tab-btn[onclick*='admin']").classList.add('active');
                document.getElementById('adminPanel').classList.add('active');
            } else {
                document.querySelector(".tab-btn[onclick*='staff']").classList.add('active');
                document.getElementById('staffPanel').classList.add('active');
                loadTenants(); // Trigger database load on switch
            }
        }

        // Handle Admin Authentication Session
        document.getElementById('adminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                type: 'admin',
                email: document.getElementById('adminEmail').value,
                password: document.getElementById('adminPassword').value
            };

            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            if(data.success) {
                localStorage.setItem('mesa3d_tenant_id', data.user.id);
                localStorage.setItem('mesa3d_tenant_name', data.user.name);
                window.location.href = '/admin/admin.html';
            } else {
                alert("Access Denied: " + data.error);
            }
        });

        // Handle Kitchen Terminal Authentication Session via rapid PIN codes
        document.getElementById('staffForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                type: 'staff',
                restaurant_id: document.getElementById('staffTenantDropdown').value,
                passcode: document.getElementById('staffPasscode').value
            };

            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            if(data.success) {
                localStorage.setItem('mesa3d_tenant_id', data.user.id);
                localStorage.setItem('mesa3d_tenant_name', data.user.name);
                window.location.href = '/kitchen/kitchen.html';
            } else {
                alert("Access Denied: " + data.error);
            }
        });
    </script>
</body>
</html>
