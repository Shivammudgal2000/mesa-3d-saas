<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Interactive Customer Menu</title>
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: system-ui, sans-serif; padding-bottom: 70px; }
        .menu-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .dish-card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 15px; text-align: center; position: relative; overflow: hidden; }
        .allergy-tag { display: inline-block; background: #e67e22; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin: 4px; }
        .price-text { font-size: 18px; font-weight: bold; color: #2ecc71; }
        .strike-price { text-decoration: line-through; color: #777; font-size: 14px; margin-right: 8px; }
        .offer-badge { position: absolute; top: 10px; left: 10px; background: #e74c3c; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; }
        
        /* Floating Button Layout styling */
        #bellButton { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: #ff9f43; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; box-shadow: 0 4px 15px rgba(255,159,67,0.4); border: none; z-index: 999; transition: transform 0.2s; }
        #bellButton:active { transform: scale(0.9); }
        .modal-btn { width: 100%; padding: 10px; background: #222; border: 1px solid #333; color: white; border-radius: 8px; text-align: left; cursor: pointer; font-size: 14px; }
        .modal-btn:hover { background: #333; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <h2 style="text-align: center; margin-top: 20px; color: #fff;">✨ Interactive 3D Experience</h2>
    
    <div class="menu-container" id="menuDisplayGrid"></div>

    <button id="bellButton">🛎️</button>

    <div id="waiterModal" style="display: none; position: fixed; bottom: 90px; right: 20px; background: #111; border: 1px solid #333; padding: 16px; border-radius: 14px; z-index: 1000; width: 280px; box-shadow: 0px 10px 30px rgba(0,0,0,0.7);">
        <h4 style="margin: 0 0 12px 0; border-bottom: 1px solid #222; padding-bottom: 6px; color: #ff9f43;">🛎️ Request Table Service</h4>
        <div style="display: flex; flex-direction: column; gap: 8px;">
            <button class="modal-btn" onclick="fireWaiterAlert('Water Bottle')">💧 Request Water Bottle</button>
            <button class="modal-btn" onclick="fireWaiterAlert('Extra Napkins')">🧻 Request Extra Napkins</button>
            <button class="modal-btn" onclick="fireWaiterAlert('Cutlery Set')">🍴 Request Cutlery Set</button>
            <button class="modal-btn" onclick="fireWaiterAlert('Bring Total Bill')">💵 Request Current Bill</button>
        </div>
        <textarea id="customWaiterText" placeholder="Write any specific instruction or notes here..." style="width: 100%; height: 60px; margin-top: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 6px; padding: 8px; box-sizing: border-box; resize: none; font-family: inherit;"></textarea>
        <button onclick="fireCustomAlert()" style="width: 100%; margin-top: 8px; background: #ff9f43; color: #000; border: none; padding: 8px; border-radius: 6px; font-weight: bold; cursor: pointer;">Send Custom Instruction</button>
    </div>

    <script>
        // Connect directly to the production engine automatically mapping current hostname limits
        const socket = io();

        // ELEMENT SELECTORS
        const bellButtonElement = document.getElementById('bellButton');
        const waiterModalContainer = document.getElementById('waiterModal');
        const menuDisplayGrid = document.getElementById('menuDisplayGrid');

        // Toggle UI Modal Visibilities when tapping the interaction bell
        bellButtonElement.addEventListener('click', () => {
            waiterModalContainer.style.display = waiterModalContainer.style.display === 'none' ? 'block' : 'none';
        });

        // Fetch running menus and mount elements directly onto the display DOM grid
        async function loadActiveRestaurantMenu() {
            try {
                const response = await fetch('/api/menu');
                const dishes = await response.json();
                menuDisplayGrid.innerHTML = ''; // Wipe pre-existing placeholder contexts

                if(dishes.length === 0) {
                    menuDisplayGrid.innerHTML = `<p style="text-align:center; width:100%; color:#555;">No dishes currently published on the menu engine.</p>`;
                    return;
                }

                dishes.forEach(dish => {
                    const card = document.createElement('div');
                    card.className = 'dish-card';

                    // Generate dynamic HTML segments if a active publisher offer rate reduction rule exists
                    const priceDisplay = dish.is_offer 
                        ? `<span class="strike-price">₹${dish.price}</span><span class="price-text">₹${dish.offer_price}</span>`
                        : `<span class="price-text">₹${dish.price}</span>`;
                    
                    const promotionBadge = dish.is_offer ? `<div class="offer-badge">SPECIAL OFFER</div>` : '';

                    // Split comma-separated allergy strings into individual visual inline elements
                    let allergyBadges = '';
                    if (dish.allergies) {
                        allergyBadges = dish.allergies.split(',')
                            .map(item => `<span class="allergy-tag">⚠️ ${item.trim()}</span>`).join('');
                    }

                    card.innerHTML = `
                        ${promotionBadge}
                        <div style="height: 150px; background: #1a1a1a; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; color: #444;">
                           📦 3D Model Attached
                        </div>
                        <h3 style="margin: 10px 0 5px 0;">${dish.name}</h3>
                        <div style="margin-bottom: 10px;">${allergyBadges}</div>
                        <div style="margin-top: 10px;">${priceDisplay}</div>
                        <button style="margin-top: 12px; width: 100%; padding: 8px; background:#fff; color:#000; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">View 3D Canvas</button>
                    `;
                    menuDisplayGrid.appendChild(card);
                });
            } catch (err) {
                console.error("Failed parsing relational menu tables:", err);
            }
        }

        // Fire standardized requests down the real-time WebSocket pipe pipelines
        function fireWaiterAlert(actionType) {
            socket.emit('call-waiter', { table: "Table 1", request: actionType, note: "" });
            alert(`Your request for "${actionType}" has been broadcast to the admin deck.`);
            waiterModalContainer.style.display = 'none';
        }

        // Catch custom textual inputs and send them securely over WebSockets
        function fireCustomAlert() {
            const textContent = document.getElementById('customWaiterText').value.trim();
            if(!textContent) return alert("Please type your note detail first.");
            
            socket.emit('call-waiter', { table: "Table 1", request: "Custom Assistance", note: textContent });
            alert(`Your instruction context has been securely relayed.`);
            document.getElementById('customWaiterText').value = '';
            waiterModalContainer.style.display = 'none';
        }

        // Real-Time Listener hooks ensuring pricing context remains uniform across configurations
        socket.on('menu-updated', loadActiveRestaurantMenu);
        socket.on('offers-updated', loadActiveRestaurantMenu);

        // Run initial loading parsing sequences on window startup
        window.addEventListener('DOMContentLoaded', loadActiveRestaurantMenu);
    </script>
</body>
</html>
